<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analytics — Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}?v=1.8" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="glass-card login-card shadow-lg mx-3">
        <div class="mb-4 text-center">
            <i class="bi bi-bar-chart-line-fill text-indigo" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2 text-primary">SalesFlow</h2>
            <p class="text-muted">Enterprise Analytics Dashboard</p>
        </div>

        <!-- Flash messages -->
        <div class="mt-3">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show text-start small border-0 shadow-sm" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: var(--text-primary);" role="alert">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>{{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3 text-start">
                <label for="username" class="form-label text-secondary fw-semibold small">Username</label>
                <div class="input-group">
                    <span class="input-group-text glass-input border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control glass-input border-start-0" id="username" name="username" required autocomplete="off">
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label text-secondary fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text glass-input border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control glass-input border-start-0" id="password" name="password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-indigo w-100 py-2"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
